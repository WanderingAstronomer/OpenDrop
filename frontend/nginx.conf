server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Static frontend (vanilla JS + Leaflet).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API reverse proxy. nginx OVERWRITES X-Real-IP with the real peer ($remote_addr),
    # so a client-supplied header cannot spoof the cooldown ip_hash (ARCHITECTURE §6).
    # We intentionally do NOT pass through any client X-Forwarded-For for trust.
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }
}
