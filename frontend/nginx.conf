# gzip text assets (cuts repeat-visit + mobile bytes)
gzip on;
gzip_vary on;
gzip_min_length 256;
gzip_types text/plain text/css application/javascript application/json image/svg+xml;

# Per-IP read rate limiting (bounds scraping/DoS cost on the unauthenticated read API)
limit_req_zone $binary_remote_addr zone=api_rl:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=export_rl:10m rate=6r/m;
limit_req_status 429;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # --- Security headers (defense-in-depth; CSP is the strongest XSS backstop) ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://unpkg.com https://challenges.cloudflare.com; style-src 'self' https://unpkg.com 'unsafe-inline'; img-src 'self' data: https://*.basemaps.cartocdn.com https://tile.openstreetmap.org https://server.arcgisonline.com https://unpkg.com; connect-src 'self' https://challenges.cloudflare.com; frame-src https://challenges.cloudflare.com; worker-src 'self' blob:; object-src 'none'; base-uri 'self'" always;

    # Static frontend (vanilla JS + Leaflet).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived caching for immutable static assets (pinned CDN libs + our modules).
    location ~* \.(?:css|js|svg|png|jpg|jpeg|gif|ico)$ {
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "public, max-age=3600" always;
        try_files $uri =404;
    }

    # User-uploaded photos (served read-only from the shared media volume).
    # ^~ so this prefix wins over the static-asset regex (which would otherwise grab /media/*.jpg);
    # no try_files (try_files + alias is buggy — resolves /srv/media//media/...).
    location ^~ /media/ {
        alias /srv/media/;
        expires 7d;
        add_header Cache-Control "public" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Stricter limit for the full-dataset export (it changes slowly; abuse-prone).
    location /api/export {
        limit_req zone=export_rl burst=3;
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # API reverse proxy. nginx OVERWRITES X-Real-IP with the real peer ($remote_addr),
    # so a client-supplied header cannot spoof the cooldown ip_hash (ARCHITECTURE §6).
    # We intentionally do NOT pass through any client X-Forwarded-For for trust.
    location /api/ {
        limit_req zone=api_rl burst=40 nodelay;
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
    }
}
