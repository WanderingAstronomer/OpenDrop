name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      db:
        image: postgis/postgis:17-3.5
        env:
          POSTGRES_USER: opendrop
          POSTGRES_PASSWORD: opendrop
          POSTGRES_DB: opendrop
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U opendrop -d opendrop"
          --health-interval 5s --health-timeout 5s --health-retries 20
    env:
      DATABASE_URL: postgresql://opendrop:opendrop@localhost:5432/opendrop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r backend/requirements.txt -r backend/requirements-dev.txt
      - name: Lint (ruff)
        run: ruff check backend/app pipeline
      - name: Apply schema
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          for f in migrations/*.sql; do
            echo "applying $f"; psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
          done
      - name: Run tests
        run: pytest
