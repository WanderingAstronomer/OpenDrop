<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark" />
  <title>OpenDrop — US clothing donation map</title>
  <meta name="description" content="OpenDrop is a community-owned, open-data map of clothing donation locations across the United States — drop bins, thrift stores, mutual aid closets, and church drives." />
  <meta name="theme-color" content="#15616d" />
  <script>
    /* Resolve the theme BEFORE first paint (no flash). Explicit choice wins; otherwise
       follow the OS. theme.js takes over for live OS-changes and the toggle. */
    (function () {
      try {
        var t = localStorage.getItem("opendrop_theme");
        if (t !== "light" && t !== "dark") {
          t = (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) ? "dark" : "light";
        }
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {
        document.documentElement.setAttribute("data-theme", "light");
      }
    })();
  </script>
  <meta property="og:title" content="OpenDrop — US clothing donation map" />
  <meta property="og:description" content="Find and verify clothing donation locations near you. Community-owned open data." />
  <meta property="og:type" content="website" />
  <link rel="stylesheet" href="/vendor/leaflet/leaflet.css" />
  <link rel="stylesheet" href="/vendor/markercluster/MarkerCluster.css" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <h1 class="sr-only">OpenDrop — map of US clothing donation locations</h1>
  <div id="map" role="application" aria-label="Map of clothing donation locations"></div>

  <!-- Top bar (z30): the redesign's chrome bar — brand | flex search | action cluster. On desktop
       (>=1024px) it is a full-width 64px surface the side rails tuck under; on mobile it floats
       transparent with safe-area padding (each child carries its own surface). The bar itself is
       click-transparent (pointer-events none) so any empty band never steals map interaction;
       children re-enable pointer events. -->
  <div class="topbar">
    <!-- Brand mark — also a BUTTON: tapping the logo re-opens the welcome/about card (js/chrome.js).
         Mobile shows the dedicated square ICON; desktop shows the full wordmark lockup. -->
    <button class="brand" type="button" aria-label="About OpenDrop" title="About OpenDrop">
      <img class="brand-icon" src="opendrop-icon.png" alt="" width="128" height="128" />
      <picture class="brand-wordmark">
        <source srcset="opendrop-logo.webp" type="image/webp" />
        <img class="brand-logo" src="opendrop-logo.png" alt="" width="865" height="240" />
      </picture>
    </button>

    <div id="search" class="search">
      <div class="search-field">
        <input id="search-input" type="search" placeholder="Search a city or address…"
               autocomplete="off" aria-label="Search for a place or address" />
        <button id="search-clear" class="search-clear" type="button" aria-label="Clear search" hidden>✕</button>
      </div>
      <ul id="search-results" class="search-results" role="listbox" aria-label="Search results"></ul>
      <div id="search-live" class="sr-only" role="status" aria-live="polite"></div>
    </div>

    <!-- Menu: a hamburger that drops a vertical icon RAIL (about / legend / theme / layers).
         Clicking a rail icon opens its menu to the LEFT; theme toggles inline; about re-opens the
         welcome card. Same on desktop + mobile — wired in js/chrome.js. -->
    <div class="topbar-actions">
      <button id="menu-btn" class="bar-btn" type="button" aria-label="Menu" aria-haspopup="true"
              aria-expanded="false" aria-controls="menu-rail" title="Menu">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h16"></path></svg>
      </button>
      <div id="menu-rail" class="menu-rail" role="menu" aria-label="Map tools" hidden>
        <button id="info-btn" class="bar-btn rail-btn" type="button" role="menuitem" aria-label="About OpenDrop" title="About OpenDrop">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" aria-hidden="true"><circle cx="12" cy="12" r="9"></circle><path d="M12 11.2v5"></path><circle cx="12" cy="7.6" r="0.7" fill="currentColor" stroke="none"></circle></svg>
        </button>
        <button id="legend-btn" class="bar-btn rail-btn" type="button" role="menuitem" aria-haspopup="true"
                aria-expanded="false" aria-controls="legend-pop" aria-label="Location confidence legend" title="What the pin colors mean">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 10c0 6-8 12-8 12S4 16 4 10a8 8 0 1 1 16 0Z"></path><circle cx="12" cy="10" r="3"></circle></svg>
        </button>
        <button id="theme-toggle" class="bar-btn rail-btn theme-toggle" type="button" role="menuitem" aria-label="Switch theme" title="Switch theme">☾</button>
        <button id="layers-btn" class="bar-btn rail-btn" type="button" role="menuitem" aria-haspopup="true"
                aria-expanded="false" aria-controls="layers-pop" aria-label="Map layers" title="Map layers">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.9"
               stroke-linejoin="round" aria-hidden="true"><path d="M12 3l9 5-9 5-9-5 9-5z"></path><path d="M3 13l9 5 9-5"></path></svg>
        </button>
      </div>
    </div>
  </div>

  <div id="map-status" class="map-status" role="status" aria-live="polite" hidden></div>

  <!-- Popovers (z40). The legend card that used to live permanently bottom-left is now the "i"
       popover; layers-pop rows are built by js/chrome.js from the basemap registry. Closing on an
       outside press is wired in js/chrome.js (no blocking backdrop layer). -->
  <div id="layers-pop" class="map-pop" role="menu" aria-label="Map layers" hidden></div>
  <div id="legend-pop" class="map-pop" role="dialog" aria-label="Location confidence legend" hidden>
    <div id="legend" class="legend">
      <strong>Location Confidence</strong>
      <div class="conf-scale" role="img" aria-label="Marker confidence colors: red is low, orange is medium, green is high">
        <div class="conf-col"><span class="conf-bar low"></span><span class="conf-cap low">Low</span></div>
        <div class="conf-col"><span class="conf-bar medium"></span><span class="conf-cap medium">Medium</span></div>
        <div class="conf-col"><span class="conf-bar high"></span><span class="conf-cap high">High</span></div>
      </div>
      <div class="legend-row legend-pending">
        <span class="ring-swatch pending" aria-hidden="true"></span>
        <span>Awaiting feedback</span>
      </div>
      <div class="legend-links">
        <a href="/privacy.html">Privacy</a> ·
        <a href="/terms.html">Terms</a> ·
        <a href="https://github.com/WanderingAstronomer/OpenDrop" target="_blank" rel="noopener">Source</a>
      </div>
    </div>
  </div>

  <!-- Place details: a non-modal overlay panel (desktop: left dock; mobile: two-snap bottom
       sheet). Deliberately NOT aria-modal and no focus trap — the map must stay reachable, same
       principle as #submit-panel below. Content is injected by js/panel.js. -->
  <section id="place-panel" class="place-panel" role="region" aria-label="Place details" aria-hidden="true">
    <div class="pp-head">
      <button class="pp-grab" type="button" aria-label="Expand or collapse details" hidden></button>
      <div class="pp-head-row">
        <h2 class="pp-title" tabindex="-1"></h2>
        <button class="pp-close" type="button" aria-label="Close place details">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <!-- Identity row: a blue chip (also the Directions link — href set per-place by panel.js)
           beside the address + category lines, matching the design's header block. -->
      <div class="pp-identity">
        <a class="pp-dir-btn" target="_blank" rel="noopener" aria-label="Directions to this spot" title="Directions" href="#">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20 10c0 6-8 12-8 12S4 16 4 10a8 8 0 1 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
        </a>
        <div class="pp-idtext">
          <div class="pp-addr"></div>
          <div class="pp-sub"></div>
        </div>
      </div>
    </div>
    <div class="pp-body"></div>
    <!-- Collapse tab: a CHILD of the panel so the panel's single transform slides it in exact
         lockstep with the dock (no second animation to desync). Sticks out the left edge;
         visibility:visible keeps it shown while the collapsed panel is visibility:hidden. -->
    <button id="pp-tab" class="pp-tab" type="button" aria-controls="place-panel" aria-expanded="false"
            aria-label="Reopen place details" hidden>›</button>
  </section>

  <aside id="list-panel" class="list-panel" aria-label="Locations in view" aria-hidden="true">
    <!-- Mobile sheet drag handle (hidden on the desktop rail) — pointer events wired in list.js. -->
    <button class="list-grab sheet-grab" type="button" aria-label="Expand or collapse the list" hidden></button>
    <div class="list-head">
      <label for="list-filter">Show</label>
      <select id="list-filter" aria-label="Filter locations by category"></select>
      <span id="list-count" class="list-count" aria-live="polite" aria-atomic="true"></span>
      <button id="list-close" class="list-close" type="button" aria-label="Close list">✕</button>
    </div>
    <ul id="list-results" class="list-results" aria-live="polite" aria-relevant="additions text" aria-label="Locations in view"></ul>
    <!-- Collapse tab: a CHILD of the drawer (rides its transform in lockstep). Sticks out the right edge. -->
    <button id="list-tab" class="list-tab" type="button" aria-controls="list-panel" aria-expanded="false"
            aria-label="Collapse list" hidden>‹</button>
  </aside>

  <div class="map-ctl-br">
    <div class="zoom-ctl" role="group" aria-label="Zoom">
      <button id="zoom-in" class="zoom-btn" type="button" aria-label="Zoom in">+</button>
      <button id="zoom-out" class="zoom-btn" type="button" aria-label="Zoom out">−</button>
    </div>
    <button id="locate-btn" class="locate-btn" type="button" aria-label="Go to my location"
            data-tooltip="Go to my location">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" aria-hidden="true">
        <circle cx="12" cy="12" r="6"></circle>
        <circle cx="12" cy="12" r="1.6" fill="currentColor" stroke="none"></circle>
        <line x1="12" y1="2" x2="12" y2="5"></line>
        <line x1="12" y1="19" x2="12" y2="22"></line>
        <line x1="2" y1="12" x2="5" y2="12"></line>
        <line x1="19" y1="12" x2="22" y2="12"></line>
      </svg>
    </button>
    <button id="add-btn" class="add-btn" type="button" aria-label="Add a donation location">+ Add location</button>
  </div>

  <!-- Non-modal by design: pin mode requires interacting with the map behind the panel, so
       aria-modal would be a lie to screen readers (the ARIA-truthfulness rule). -->
  <div id="submit-panel" class="panel hidden" role="dialog" aria-label="Add a donation location" aria-hidden="true"></div>
  <div id="photo-modal" class="photo-modal" aria-hidden="true"></div>
  <div id="toast-host" class="toast-host" role="status" aria-live="polite"></div>

  <noscript>
    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center;font-family:system-ui,sans-serif;background:#fff;z-index:3000">
      OpenDrop is an interactive map and needs JavaScript enabled to display donation locations.
    </div>
  </noscript>

  <script src="/vendor/leaflet/leaflet.js"></script>
  <script src="/vendor/markercluster/leaflet.markercluster.js"></script>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
  <script type="module" src="/js/main.js"></script>
</body>
</html>
