services:
  db:
    image: postgis/postgis:17-3.5
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-opendrop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opendrop}
      POSTGRES_DB: ${POSTGRES_DB:-opendrop}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/0001_init.sql:/docker-entrypoint-initdb.d/0001_init.sql:ro
    healthcheck:
      # Schema-aware: passes only once 0001_init.sql has created+seeded `sources`,
      # so `api` (depends_on healthy) never connects during the initdb temp-server window.
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-opendrop} -d $${POSTGRES_DB:-opendrop} && psql -U $${POSTGRES_USER:-opendrop} -d $${POSTGRES_DB:-opendrop} -tAc 'select 1 from sources limit 1'"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://opendrop:opendrop@db:5432/opendrop}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - media:/app/media               # uploaded photos (written by the API)
    restart: unless-stopped

  web:
    image: nginx:alpine
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - media:/srv/media:ro            # serve uploaded photos at /media/
    depends_on:
      api:
        condition: service_healthy   # api has a Dockerfile HEALTHCHECK; don't proxy to a cold API
    ports:
      - "${WEB_PORT:-8080}:80"
    healthcheck:
      # 127.0.0.1, not localhost: busybox wget resolves localhost to ::1 first, but nginx only
      # listens on IPv4 (listen 80) — so the healthcheck failed (container shown "unhealthy")
      # while the server was actually fine. Pin to IPv4 to match where nginx listens.
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Opt-in scheduled re-sync (freshness + closure detection). Enable with:
  #   docker compose --profile scheduler up -d
  scheduler:
    image: opendrop-api
    build:
      context: .
      dockerfile: backend/Dockerfile
    profiles: ["scheduler"]
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://opendrop:opendrop@db:5432/opendrop}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    command: ["sh", "-c", "while true; do python -m pipeline.sync || true; sleep ${SYNC_INTERVAL_SECONDS:-86400}; done"]

volumes:
  pgdata:
  media:
