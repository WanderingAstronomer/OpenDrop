[pytest]
# Discover BOTH the no-DB logic tests (tests/) and the DB-backed API tests (backend/tests/)
# in one run, and put the repo root + backend/ on sys.path so `pipeline` and `app` import.
testpaths = tests backend/tests
pythonpath = . backend
addopts = -q
markers =
    owner_only: needs the schema-owner DB role (pipeline/seeder/reconcile work, or owner-level
        DELETE cleanup). The API runs as the least-privilege opendrop_app role in prod, so the
        app-role CI pass runs `-m "not owner_only"`; these still run in the default owner pass.
